{% extends 'customer_dashboard.html' %}

{% block content %}

<div class="container mt-4 d-flex justify-content-center">
    <div class="rounded-box cart-window w-100">

        <h4 class="mb-3">Your Cart</h4>
        <hr>

        {% if cart_items %}
        {% for x in cart_items %}
        <div
            class="cart-item d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center p-3 mb-3">

            <!-- ITEM NAME -->
            <div>
                <h6 class="mb-1">{{ x.menu_item.name }}</h6>
                <p class="text-muted mb-0">${{ x.menu_item.price }}</p>
            </div>

            <!-- ACTION BUTTONS -->
            <div class="d-flex flex-column flex-md-row align-items-start align-items-md-center mt-2 mt-md-0 gap-2">

                <!-- QUANTITY DROPDOWN -->
                <form action="{{url_for('set_quantity')}}" method="POST">
                    <input type="hidden" name="order_item_id" value="{{ x.order_item_id }}">
                    <select name="quantity" class="form-select quantity-select" onchange="this.form.submit()">
                        {% for q in range(1, 11) %}
                        <option value="{{ q }}" {% if q==x.quantity %}selected{% endif %}>{{ q }}</option>
                        {% endfor %}
                    </select>
                </form>

                <!-- DELETE BUTTON -->
                <form action="{{ url_for('deletecartitem', id=x.order_item_id) }}" method="POST" class="d-inline">

                    <button type="submit" class="btn delete-btn">
                        Remove
                    </button>

                </form>


            </div>
        </div>
        {% endfor %}
        <!-- TOTAL BILL WINDOW -->
        <div class="total-window rounded-box mt-4 p-3">

            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="mb-0">Total</h5>
                <h5 class="mb-0">${{ total }} </h5>
                <!-- Replace total_amount with your own variable -->
            </div>

            <form action="{{url_for('place_order')}}" method="POST">
                <button type="submit" class="btn place-order-btn w-100">
                    Place Order
                </button>
            </form>

        </div>

        {% else %}
        <p class="text-muted">Your cart is currently empty</p>
        {% endif %}

    </div>
</div>

{% endblock content %}
